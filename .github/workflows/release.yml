name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14   # Apple Silicon runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build Skrivar.app
        run: |
          chmod +x build_app.sh
          ./build_app.sh "${{ steps.version.outputs.VERSION }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Skrivar v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Skrivar v${{ steps.version.outputs.VERSION }}

            Download `Skrivar-v${{ steps.version.outputs.VERSION }}.zip`, unzip, and drag to Applications.

            **First launch:** Right-click → Open → "Open Anyway" (app is not code-signed yet).

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          files: dist/Skrivar-v${{ steps.version.outputs.VERSION }}.zip
          draft: false
          prerelease: false
